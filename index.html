<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اعتذار خاص 🌹</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #ffb3c1;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            background: linear-gradient(45deg, #1a1a2e, #16213e);
        }

        /* تأثير الخلفية المضيئة */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.5) 100%);
        }

        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* تعديل الشخصية لتصبح إيموجي احترافي */
        .emoji-character {
            font-size: 100px;
            margin-bottom: 20px;
            display: inline-block;
            animation: floating 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px var(--primary-color));
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ff4d6d, #ffb3c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .message {
            font-size: 1.2rem;
            color: var(--secondary-color);
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .btn-glow {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: var(--primary-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.4);
            outline: none;
        }

        .btn-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.6);
            background: #ff758f;
        }

        .btn-glow:active { transform: scale(0.95); }

    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="emoji-character" id="mainEmoji">🥺</div>
        <h1>I'M SORRY SWEETIE!</h1>
        <p class="message">🎶 بوم بوم بوم.. منك ما جاني نوم 🎶</p>
        <button class="btn-glow" onclick="playPerfectPart()">اضغطي هنا للصلح ▶️</button>
    </div>

    <video id="myVideo" style="display:none;">
        <source src="music.mp3.mp4" type="video/mp4">
    </video>

    <script>
        function playPerfectPart() {
            const video = document.getElementById('myVideo');
            const emoji = document.getElementById('mainEmoji');
            
            // --- التحكم في وقت الموسيقى ---
            // لنفترض أن الجزء الذي تريده يبدأ من الثانية 10 وينتهي في الثانية 25
            const startTime = 57; 
            const duration = 23; // مدة التشغيل بالثواني

            video.currentTime = startTime;
            video.play();

            // تغيير الإيموجي عند التشغيل
            emoji.innerText = '🌹';
            emoji.style.animation = 'floating 1s ease-in-out infinite';

            // إيقاف الفيديو بعد انتهاء المدة المحددة
            setTimeout(() => {
                video.pause();
                emoji.innerText = '🥺';
                emoji.style.animation = 'floating 3s ease-in-out infinite';
            }, duration * 1000);
        }
    </script>
</body>
</html>
