<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اعتذار خاص 🌹</title>
    <style>
        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white; font-family: sans-serif; overflow: hidden; text-align: center;
        }
        /* الشخصية الجديدة (إيموجي متحرك) */
        .emoji {
            font-size: 100px; margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px #ff4d6d);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        h1 { font-size: 2.2rem; background: linear-gradient(to right, #ff4d6d, #ffb3c1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn {
            padding: 15px 35px; border-radius: 50px; border: none; cursor: pointer;
            background: #ff4d6d; color: white; font-size: 1.1rem; font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4); transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); background: #ff758f; }
    </style>
</head>
<body>
    <div class="emoji" id="face">🥺</div>
    <h1>أنا آسف جداً.. سامحيني 🌹</h1>
    <p>🎶 بوم بوم بوم.. منك ما جاني نوم 🎶</p>
    <button class="btn" onclick="startApology()">اضغطي هنا للصلح ▶️</button>

    <video id="vid" style="display:none;">
        <source src="music.mp3.mp4" type="video/mp4">
    </video>

    <script>
        function startApology() {
            const v = document.getElementById('vid');
            const face = document.getElementById('face');
            
            // --- تعديل الوقت هنا ---
            const startAt = 56;  // اجعلها تبدأ من الثانية 5 (غير الرقم كما تحب)
            const stopAfter = 23; // ستتوقف بعد 10 ثواني من العمل
            
            v.currentTime = startAt;
            v.play();
            face.innerText = '🌹'; // تتغير الشخصية عند الضغط

            setTimeout(() => {
                v.pause();
                face.innerText = '🥺';
            }, stopAfter * 1000);
        }
    </script>
</body>
</html>
