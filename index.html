<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>I'm Sorry Sweetie 🌹</title>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .character { width: 200px; height: 250px; background: #FFD700; border-radius: 50% 50% 45% 45%; border: 5px solid #FF1493; position: relative; animation: bounce 0.6s infinite; }
        .tear { position: absolute; bottom: 80px; width: 8px; height: 15px; background: #00CED1; border-radius: 50%; animation: cry 1.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes cry { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(30px); } }
        button { padding: 15px 30px; font-size: 1.2rem; background: #FF1493; color: white; border: 3px solid #FFD700; border-radius: 50px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="character">
        <div class="tear" style="left: 60px;"></div>
        <div class="tear" style="right: 60px;"></div>
    </div>
    <h1 style="color: #FF1493;">I'M SORRY SWEETIE! 🥺</h1>
    <p>🎶 بوم بوم بوم.. منك ما جاني نوم 🎶</p>
    <button onclick="document.getElementById('memeSong').play()">▶️ اضغطي هنا للصلح</button>
    <audio id="memeSong" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
